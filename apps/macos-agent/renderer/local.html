<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>VidShorter Local Processor</title>
    <style>
      :root { color-scheme: light; }
      body { font-family: ui-serif, Georgia, Cambria, "Times New Roman", serif; margin: 0; background: #fff; color: #111; }
      .shell { max-width: 1120px; margin: 0 auto; padding: 48px 32px 64px; }
      header { display: flex; align-items: center; justify-content: space-between; gap: 16px; border-bottom: 1px solid #eee; padding: 18px 24px; font-family: system-ui, -apple-system, Segoe UI, sans-serif; }
      .brand { font-size: 24px; font-weight: 700; display: flex; align-items: center; gap: 10px; }
      h1 { text-align: center; font-size: 44px; font-weight: 600; margin: 56px 0 12px; }
      .credits { text-align: center; color: #777; font-size: 22px; margin-bottom: 36px; }
      .drop { border: 2px dashed #ddd; border-radius: 12px; min-height: 150px; display: grid; place-items: center; text-align: center; cursor: pointer; transition: border-color .15s, background .15s; }
      .drop:hover { border-color: #111; background: #fafafa; }
      .drop strong { display: block; font-size: 22px; margin-bottom: 8px; font-weight: 500; }
      .drop span { color: #777; font-size: 15px; }
      input[type="file"] { display: none; }
      .actions { display: flex; justify-content: center; gap: 12px; margin-top: 18px; }
      button, .download { font-family: system-ui, -apple-system, Segoe UI, sans-serif; border: 0; background: #111; color: #fff; border-radius: 10px; padding: 12px 18px; cursor: pointer; text-decoration: none; font-size: 14px; }
      button.secondary { background: #f3f3f3; color: #111; }
      button:disabled { opacity: .45; cursor: not-allowed; }
      .status { margin-top: 28px; border-radius: 12px; background: #f7f7f7; padding: 18px; font-family: system-ui, -apple-system, Segoe UI, sans-serif; }
      .bar { height: 9px; background: #e5e5e5; border-radius: 999px; overflow: hidden; margin-top: 12px; }
      .fill { height: 100%; width: 0%; background: #111; transition: width .25s ease; }
      .err { margin-top: 18px; color: #b00020; background: #fff0f0; border-radius: 12px; padding: 16px; white-space: pre-wrap; font-family: system-ui, -apple-system, Segoe UI, sans-serif; }
      .clips { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 18px; margin-top: 28px; }
      .card { border: 1px solid #eee; border-radius: 12px; padding: 14px; background: #fff; box-shadow: 0 10px 28px rgba(0,0,0,.05); }
      .thumb { width: 100%; aspect-ratio: 16 / 9; object-fit: cover; background: #f5f5f5; border-radius: 8px; }
      video { width: 100%; border-radius: 8px; margin-top: 10px; background: #000; }
      .title { font-size: 18px; font-weight: 600; margin-top: 12px; }
      .meta { font-family: system-ui, -apple-system, Segoe UI, sans-serif; font-size: 13px; color: #666; margin: 5px 0 10px; }
      @media (max-width: 760px) { .shell { padding: 28px 18px 44px; } h1 { font-size: 34px; } .clips { grid-template-columns: 1fr; } }
    </style>
  </head>
  <body>
    <header><div class="brand">▰ VidShorter AI</div><button id="web" class="secondary" type="button">Open Web UI</button></header>
    <main class="shell">
      <h1>Input Video</h1>
      <div class="credits">✓ Local Mac processing enabled · Version <span id="version">0.6.2</span></div>
      <label class="drop" id="drop">
        <input id="file" type="file" accept="video/*" />
        <div><strong id="fileLabel">Choose a local MP4/MOV video</strong><span>Generated highlights stay on this Mac and do not require sign in.</span></div>
      </label>
      <div class="actions"><button id="analyze" type="button" disabled>Analyze</button><button id="copy" class="secondary" type="button">Copy Logs</button></div>
      <div class="status" id="status" style="display:none"><div id="statusText">Ready</div><div class="bar"><div class="fill" id="fill"></div></div></div>
      <div class="err" id="error" style="display:none"></div>
      <div class="clips" id="clips"></div>
    </main>
    <script src="./local.js"></script>
  </body>
</html>
